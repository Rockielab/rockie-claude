name: smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check sqlite3 FTS5
        run: |
          set -e
          SQLITE3_BIN=$(command -v sqlite3)
          echo "sqlite3: $SQLITE3_BIN"
          "$SQLITE3_BIN" ":memory:" "CREATE VIRTUAL TABLE t USING fts5(x)" && echo "FTS5 ok"
          # idastone pins to /usr/bin/sqlite3 — on Ubuntu this is the system sqlite3;
          # alias if runner gives us /usr/bin/sqlite3 with FTS5, else symlink
          if [ ! -x /usr/bin/sqlite3 ]; then
            sudo ln -sf "$SQLITE3_BIN" /usr/bin/sqlite3
          fi
          /usr/bin/sqlite3 ":memory:" "CREATE VIRTUAL TABLE t USING fts5(x)"

      - name: Run smoke test
        run: bash tests/smoke-test.sh

      - name: Run installer against a scratch project
        run: |
          SCRATCH=$(mktemp -d)
          (cd "$SCRATCH" && git init -q)
          # Non-interactive: pre-accept
          echo Y | bash install.sh "$SCRATCH"
          # Verify key files landed
          test -f "$SCRATCH/.claude/settings.json"
          test -f "$SCRATCH/.claude/memory/workflow.db"
          test -x "$SCRATCH/.claude/hooks/learn-capture.sh"
          test -x "$SCRATCH/.claude/scripts/journal.py"
          test -x "$SCRATCH/.claude/scripts/queue.py"
          test -x "$SCRATCH/.claude/scripts/calibration.py"
          test -x "$SCRATCH/.claude/scripts/budget.py"
          test -x "$SCRATCH/.claude/scripts/zcm.sh"
          echo "installer artifacts verified"
